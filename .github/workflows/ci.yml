name: CI

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  build-test:
    runs-on: ubuntu-latest

    env:
      DISABLE_STATIC: "1"
      PYTHONPATH: ${{ github.workspace }}:${{ github.workspace }}/api

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            api/requirements.txt
            requirements-dev.txt

      - name: Install deps runtime
        run: |
          python -m pip install -U pip
          python -m pip install -r api/requirements.txt

      - name: Install deps dev
        run: |
          python -m pip install ruff black mypy pytest pytest-cov httpx
          if [ -f requirements-dev.txt ]; then python -m pip install -r requirements-dev.txt; fi

      - name: Show requirements & verify imports
        run: |
          echo "=== api/requirements.txt ==="
          cat api/requirements.txt || true
          echo "=== requirements-dev.txt ==="
          cat requirements-dev.txt || true
          python - <<'PY'
          import importlib.util as I
          import sys

          pkgs = ["fastapi", "uvicorn", "structlog", "starlette_exporter"]
          missing = [p for p in pkgs if I.find_spec(p) is None]

          print("Python:", sys.version)
          print("Missing:", missing)

          assert not missing, f"Missing: {missing}"
          PY

      - name: Lint
        run: python -m ruff check .

      - name: Format check
        run: python -m black --check .

      - name: Type check
        run: python -m mypy api --ignore-missing-imports

      - name: Tests
        run: python -m pytest -q --maxfail=1
